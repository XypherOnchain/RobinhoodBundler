<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login — Robinhood Bundler</title>
  <style>
    :root { --bg:#0b0f14; --card:#121820; --border:#243041; --text:#e8eef7; --muted:#8b9bb0; --accent:#3b82f6; }
    * { box-sizing: border-box; }
    body { margin:0; min-height:100vh; display:grid; place-items:center; font-family: ui-sans-serif, system-ui, sans-serif;
      background: radial-gradient(1200px 600px at 20% -10%, #1a2740, transparent), var(--bg); color: var(--text); }
    .card { width:min(400px, 92vw); background:var(--card); border:1px solid var(--border); border-radius:16px; padding:28px; }
    h1 { margin:0 0 6px; font-size:22px; }
    p { margin:0 0 18px; color:var(--muted); font-size:13px; }
    label { display:block; font-size:12px; color:var(--muted); margin:12px 0 6px; }
    input { width:100%; padding:12px 14px; border-radius:10px; border:1px solid var(--border); background:#0c121a; color:var(--text); }
    button { margin-top:18px; width:100%; padding:12px; border:0; border-radius:10px; background:var(--accent); color:#fff; font-weight:600; cursor:pointer; }
    button:disabled { opacity:.6; cursor:wait; }
    .err { margin-top:12px; color:#f87171; font-size:13px; min-height:18px; }
  </style>
</head>
<body>
  <form class="card" id="loginForm">
    <h1>Bundler login</h1>
    <p>Ported from stealth-bundler session auth. Single operator gate.</p>
    <label>Username</label>
    <input id="user" autocomplete="username" value="admin" />
    <label>Password</label>
    <input id="pass" type="password" autocomplete="current-password" />
    <button type="submit" id="btn">Sign in</button>
    <div class="err" id="err"></div>
  </form>
  <script>
    document.getElementById("loginForm").onsubmit = async (e) => {
      e.preventDefault();
      const btn = document.getElementById("btn");
      const err = document.getElementById("err");
      err.textContent = "";
      btn.disabled = true;
      try {
        const r = await fetch("/api/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            username: document.getElementById("user").value.trim(),
            password: document.getElementById("pass").value,
          }),
        });
        const j = await r.json().catch(() => ({}));
        if (!r.ok) throw new Error(j.error || r.statusText);
        location.href = "/";
      } catch (ex) {
        err.textContent = ex.message || String(ex);
        btn.disabled = false;
      }
    };
  </script>
</body>
</html>
